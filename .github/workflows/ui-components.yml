name: UI Component Tests
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  jest-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install base deps
        run: npm ci || npm install
      - name: Install test-only deps (no save)
        run: |
          npm i --no-save jest @testing-library/react @testing-library/jest-dom react-test-renderer babel-jest @babel/preset-env @babel/preset-react
      - name: Run Jest UI tests
        run: npx -y jest --config ./jest.config.cjs
