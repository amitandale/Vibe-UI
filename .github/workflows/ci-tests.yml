name: CI Tests
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci || npm install
      - name: "Debug: list test files"
        run: |
          echo "Listing *.test.mjs files:"
          git ls-files | grep -E '(^|/)tests/.*\.test\.mjs$' || true
      - name: Run tests (node --test with find)
        run: |
          set -euo pipefail
          mapfile -d '' FILES < <(find . -type f -name '*.test.mjs' -print0)
          COUNT="${#FILES[@]}"
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No .test.mjs files found"; exit 1
          fi
          echo "Running $COUNT test files with node --test"
          node --test "${FILES[@]}"
